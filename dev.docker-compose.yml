name: broadbase-dev
services:
  broadbase-api:
    build:
      context: ./broadbase-api
      dockerfile: Dockerfile.development
    restart: always
    ports:
      - "5050:5050"
    env_file:
      - ./broadbase-api/.env
    volumes:
      - ./broadbase-api:/home/app
      - /home/app/node_modules
    init: true
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - broadbase-net
    depends_on:
      broadbase-db:
        condition: service_healthy

  broadbase-graphql:
    build:
      context: ./broadbase-graphql
      dockerfile: Dockerfile.development
    restart: always
    env_file:
      - ./broadbase-graphql/.env
    volumes:
      - ./broadbase-graphql:/home/app
      - /home/app/node_modules
    depends_on:
      broadbase-db:
        condition: service_healthy
      broadbase-api:
        condition: service_started
    ports:
      - "5051:5051"
    networks:
      - broadbase-net

  broadbase-app:
    build:
      context: ./broadbase-app
      dockerfile: Dockerfile.development
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./broadbase-app/.env
    volumes:
      - ./broadbase-app:/home/app
      - /home/app/node_modules
    networks:
      - broadbase-net
    depends_on:
      broadbase-db:
        condition: service_healthy
      broadbase-api:
        condition: service_started
      broadbase-graphql:
        condition: service_started
    stdin_open: true
    tty: true

  broadbase-db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - broadbase-net

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      broadbase-db:
        condition: service_healthy
    networks:
      - broadbase-net

networks:
  broadbase-net:

volumes:
  db-data:
    driver: local
