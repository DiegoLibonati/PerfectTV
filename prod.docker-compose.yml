name: broadbase-prod
services:
  broadbase-api:
    build:
      context: ./broadbase-api
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./broadbase-api/.env
    depends_on:
      broadbase-db:
        condition: service_healthy
    expose:
      - 5050:5050
    init: true
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - broadbase-net

  broadbase-graphql:
    build:
      context: ./broadbase-graphql
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./broadbase-graphql/.env
    depends_on:
      broadbase-db:
        condition: service_healthy
      broadbase-api:
        condition: service_started
    expose:
      - 5051:5051
    networks:
      - broadbase-net

  broadbase-app:
    build:
      context: ./broadbase-app
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./broadbase-app/.env
    depends_on:
      broadbase-db:
        condition: service_healthy
      broadbase-api:
        condition: service_started
      broadbase-graphql:
        condition: service_started
    ports:
      - 3000:8080
    networks:
      - broadbase-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  broadbase-db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - broadbase-net

volumes:
  db-data:
    driver: local

networks:
  broadbase-net:
    name: broadbase-net
    driver: bridge